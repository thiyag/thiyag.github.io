<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tic Tac Toe</title>
  <link rel="icon" type="image/x-icon" href="tic-tac-toe.ico">
  <style>
    :root {
      --bg:        #1a1a2e;
      --surface:   #16213e;
      --surface2:  #0f3460;
      --accent:    #e94560;
      --x-color:   #4a90d9;
      --o-color:   #e05c5c;
      --text:      #eaeaea;
      --muted:     #8892a0;
      --radius:    10px;
      --cell-size: 80px;
      --bar-h:     64px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ══════════════════════════════════
       APP SHELL
    ══════════════════════════════════ */
    #app {
      width: 100%;
      max-width: 520px;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ══════════════════════════════════
       SCREENS
    ══════════════════════════════════ */
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem 1rem calc(var(--bar-h) + 1rem);
      gap: 0.9rem;
    }
    .screen.active { display: flex; }

    /* ══════════════════════════════════
       GAME SCREEN — custom layout
    ══════════════════════════════════ */
    #screen-game {
      padding: 0;
      overflow: hidden;
      gap: 0;
    }

    /* ══════════════════════════════════
       SETUP SCREEN
    ══════════════════════════════════ */
    h1 {
      text-align: center;
      font-size: 1.8rem;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--x-color), var(--o-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding-top: 0.5rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1rem;
    }

    .setup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* 16px minimum prevents iOS auto-zoom on focus */
    input[type="text"], input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--text);
      padding: 0.65rem 0.8rem;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--accent);
    }

    .templates-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .btn-template {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--text);
      padding: 0.6rem 0.8rem;
      cursor: pointer;
      font-size: 0.85rem;
      transition: border-color 0.15s;
      min-height: 44px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-template:active { opacity: 0.7; }
    .btn-template.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .section-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.45rem;
    }

    .error {
      color: var(--accent);
      font-size: 0.82rem;
      min-height: 1.2em;
      margin-top: 0.4rem;
    }

    /* ══════════════════════════════════
       SCOREBOARD (game top strip)
    ══════════════════════════════════ */
    #scoreboard {
      flex-shrink: 0;
      padding: 0.7rem 1.25rem 0.7rem;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .scoreboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .player-score {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      flex: 1;
    }
    .player-score.active-player .player-name { color: var(--text); }
    .player-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      transition: color 0.2s;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .player-mark { font-size: 1rem; font-weight: 900; }
    .player-mark.x { color: var(--x-color); }
    .player-mark.o { color: var(--o-color); }
    .player-wins { font-size: 1.8rem; font-weight: 900; line-height: 1; }
    .player-wins.x { color: var(--x-color); }
    .player-wins.o { color: var(--o-color); }

    .score-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
    }
    .draws-label { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; }
    .draws-count { font-size: 1.2rem; font-weight: 700; color: var(--muted); }

    /* ══════════════════════════════════
       STATUS ROW (turn indicator OR result)
    ══════════════════════════════════ */
    #status-row {
      flex-shrink: 0;
      height: 2.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #turn-indicator {
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
    }
    #turn-indicator span { font-weight: 700; }
    #turn-indicator .x { color: var(--x-color); }
    #turn-indicator .o { color: var(--o-color); }

    /* ══════════════════════════════════
       RESULT BANNER (inline, between score and board)
    ══════════════════════════════════ */
    #result-banner {
      display: none;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      animation: fade-in 0.25s ease-out;
    }
    #result-banner.show { display: flex; }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-title {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }
    .result-title.x    { color: var(--x-color); }
    .result-title.o    { color: var(--o-color); }
    .result-title.draw { color: var(--muted); }

    /* ══════════════════════════════════
       BOARD
    ══════════════════════════════════ */
    #board-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 0;
      padding: 0.5rem;
      padding-bottom: 3rem;
    }

    #board {
      display: grid;
      gap: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 3px;
      transition: opacity 0.25s;
      /* prevent context menu on long-press */
      -webkit-touch-callout: none;
    }

    #board.inactive {
      opacity: 0.5;
      pointer-events: none;
    }

    .cell {
      background: var(--surface);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: calc(var(--cell-size) * 0.45);
      font-weight: 900;
      line-height: 1;
      user-select: none;
      /* kills 300ms delay and double-tap zoom */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    /* hover only on pointer devices — not touch */
    @media (hover: hover) {
      .cell:hover:not(.taken) {
        background: var(--surface2);
        transform: scale(1.05);
      }
    }
    .cell:active:not(.taken) { background: var(--surface2); }
    .cell.taken { cursor: default; }
    .cell.mark-x { color: var(--x-color); }
    .cell.mark-o { color: var(--o-color); }

    .cell.winning {
      background: rgba(255,200,50,0.18);
      box-shadow: 0 0 0 2px rgba(255,200,50,0.6);
      animation: pulse-win 1.2s ease-in-out infinite alternate;
    }
    @keyframes pulse-win {
      from { box-shadow: 0 0 0 2px rgba(255,200,50,0.4); }
      to   { box-shadow: 0 0 8px 4px rgba(255,200,50,0.7); }
    }

    /* config badge */
    #config-badge {
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      padding: 0.3rem 1rem 0.55rem;
      flex-shrink: 0;
      opacity: 0.7;
    }

    /* ══════════════════════════════════
       BOTTOM ACTION BAR
    ══════════════════════════════════ */
    #action-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 520px;
      height: var(--bar-h);
      background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      gap: 0.5rem;
      z-index: 50;
      /* safe area inset for notched phones */
      padding-bottom: env(safe-area-inset-bottom, 5px);
      height: calc(var(--bar-h) + env(safe-area-inset-bottom, 5px));
    }

    .bar-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      min-width: 52px;
      min-height: 44px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .bar-btn svg { display: block; }
    .bar-btn:active { background: rgba(255,255,255,0.07); }
    .bar-btn.primary { color: var(--accent); }
    .bar-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .bar-btn:disabled:active { background: none; }

    /* new-game: pill style to stand out */
    #btn-new-game {
      background: var(--accent);
      color: #fff;
      min-width: 100px;
      border-radius: 22px;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 0 1rem;
      height: 44px;
    }
    #btn-new-game:active { filter: brightness(0.85); background: var(--accent); }

    /* setup screen bottom bar */
    #setup-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 0.75rem 1rem;
      padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
      z-index: 50;
    }
    .btn-full {
      width: 100%;
      padding: 0.85rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      min-height: 50px;
    }
    .btn-full:active { filter: brightness(0.85); }

    /* ══════════════════════════════════
       HAMBURGER DRAWER
    ══════════════════════════════════ */
    #drawer-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 60;
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }
    #drawer-backdrop.open { display: block; }

    #drawer {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      z-index: 70;
      transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    #drawer.open { transform: translateX(-50%) translateY(0); }

    .drawer-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 10px auto 4px;
    }

    .drawer-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 0.4rem 1.2rem 0.6rem;
    }

    .drawer-item {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      width: 100%;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      padding: 0.9rem 1.2rem;
      cursor: pointer;
      text-align: left;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
    }
    .drawer-item:active { background: rgba(255,255,255,0.06); }
    .drawer-item svg { flex-shrink: 0; color: var(--muted); }
    .drawer-item .item-label { flex: 1; }
    .drawer-item .item-sub { font-size: 0.75rem; color: var(--muted); font-weight: 400; }
    .drawer-sep {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 0.2rem 1.2rem;
    }
    .drawer-item.danger { color: var(--accent); }
    .drawer-item.danger svg { color: var(--accent); }

    /* ══════════════════════════════════
       HISTORY SHEET (inside drawer)
    ══════════════════════════════════ */
    #history-sheet {
      display: none;
      padding: 0 1.2rem 1rem;
      max-height: 50vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #history-sheet.open { display: block; }

    #history-list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .history-entry {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--muted);
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      background: var(--surface2);
      gap: 0.3rem;
    }
    .history-entry .winner { font-weight: 700; }
    .history-entry .winner.x { color: var(--x-color); }
    .history-entry .winner.o { color: var(--o-color); }
    .history-entry .winner.draw { color: var(--muted); }

  </style>
</head>
<body>
<div id="app">

  <!-- ════════ SETUP SCREEN ════════ -->
  <div id="screen-setup" class="screen">
    <h1>Tic Tac Toe</h1>

    <div class="card">
      <div class="section-label">Players</div>
      <div class="setup-grid">
        <div class="field">
          <label>Player 1</label>
          <input id="p1-name" type="text" placeholder="Player 1" maxlength="20" autocomplete="off" />
        </div>
        <div class="field">
          <label>Player 2</label>
          <input id="p2-name" type="text" placeholder="Player 2" maxlength="20" autocomplete="off" />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-label">Quick Setup</div>
      <div class="templates-row" id="templates-row"></div>
    </div>

    <div class="card">
      <div class="section-label">Custom</div>
      <div class="setup-grid">
        <div class="field">
          <label>Grid (3–15)</label>
          <input id="grid-size" type="number" min="3" max="15" value="3" inputmode="numeric" />
        </div>
        <div class="field">
          <label>Win Length</label>
          <input id="win-length" type="number" min="3" value="3" inputmode="numeric" />
        </div>
      </div>
      <div class="error" id="setup-error"></div>
    </div>
  </div>

  <!-- ════════ GAME SCREEN ════════ -->
  <div id="screen-game" class="screen">
    <h1>Tic Tac Toe</h1><h1></h1>
    <!-- Config badge -->
    <div id="config-badge"></div>
    <!-- Scoreboard -->
    <div id="scoreboard">
      <div class="scoreboard">
        <div class="player-score" id="score-p1">
          <div class="player-wins x" id="score-p1-wins">0</div>
          <div class="player-mark x">X</div>
          <div class="player-name" id="score-p1-name">Player 1</div>
        </div>
        <div class="score-center">
          <div class="draws-count" id="score-draws">0</div>
          <div class="draws-label">Draws</div>
        </div>
        <div class="player-score" id="score-p2">
          <div class="player-wins o" id="score-p2-wins">0</div>
          <div class="player-mark o">O</div>
          <div class="player-name" id="score-p2-name">Player 2</div>
        </div>
      </div>
    </div>
    <!-- Turn / Result row -->
    <div id="status-row">
      <div id="turn-indicator"></div>
      <div id="result-banner">
        <div class="result-title" id="result-title"></div>
      </div>
    </div>

    <!-- Board -->
    <div id="board-wrap">
      <div id="board"></div>
    </div>
    
  </div><!-- end screen-game -->

</div><!-- end app -->

<!-- ════════ BOTTOM ACTION BAR (game) ════════ -->
<div id="action-bar" style="display:none;">
  <button class="bar-btn" id="btn-undo" title="Undo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
    </svg>
    Undo
  </button>

  <button class="bar-btn" id="btn-new-game" title="New Game">
    New Game
  </button>

  <button class="bar-btn primary" id="btn-menu" title="Menu">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="6"  x2="20" y2="6"/>
      <line x1="4" y1="12" x2="20" y2="12"/>
      <line x1="4" y1="18" x2="20" y2="18"/>
    </svg>
    More
  </button>
</div>

<!-- ════════ BOTTOM BAR (setup) ════════ -->
<div id="setup-bar" style="display:none;">
  <button class="btn-full" id="btn-start">Start Game</button>
</div>

<!-- ════════ DRAWER BACKDROP ════════ -->
<div id="drawer-backdrop"></div>

<!-- ════════ DRAWER ════════ -->
<div id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">Options</div>

  <button class="drawer-item" id="btn-drawer-history">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <span class="item-label">History</span>
  </button>

  <div id="history-sheet">
    <div id="history-list"></div>
  </div>

  <div class="drawer-sep"></div>

  <button class="drawer-item" id="btn-drawer-settings">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    <span class="item-label">Settings</span>
    <span class="item-sub" id="drawer-config-sub"></span>
  </button>

  <div class="drawer-sep"></div>

  <button class="drawer-item danger" id="btn-drawer-new-series">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
    </svg>
    <span class="item-label">New Series</span>
    <span class="item-sub">Reset scores</span>
  </button>

  <div style="height:0.5rem;"></div>
</div>

<script>
// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const STORAGE_SERIES    = 'ttt_series';
const STORAGE_GAMESTATE = 'ttt_gamestate';
const MIN_GRID = 3, MAX_GRID = 15;

const TEMPLATES = [
  { label: 'Classic 3×3',  gridSize: 3,  winLength: 3 },
  { label: '5×5 (win 4)',  gridSize: 5,  winLength: 4 },
  { label: '10×10 (win 5)', gridSize: 10, winLength: 5 },
  { label: '15×15 (win 5)', gridSize: 15, winLength: 5 },
];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let state = {
  gridSize: 3, winLength: 3,
  players: [
    { id: 'p1', name: 'Player 1', mark: 'X' },
    { id: 'p2', name: 'Player 2', mark: 'O' },
  ],
  currentPlayerIndex: 0,
  board: [], moveCount: 0,
  gameOver: false, winner: null,
  winningCells: [],
  scores: { p1: 0, p2: 0, draws: 0 },
  history: [],
  undoStack: [],
};

// ═══════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════
function loadFromStorage() {
  try {
    const series = JSON.parse(localStorage.getItem(STORAGE_SERIES));
    if (series) {
      state.gridSize        = series.gridSize    || 3;
      state.winLength       = series.winLength   || 3;
      state.players[0].name = series.player1Name || 'Player 1';
      state.players[1].name = series.player2Name || 'Player 2';
      state.scores          = series.scores      || { p1: 0, p2: 0, draws: 0 };
      state.history         = series.history     || [];
    }
    const gs = JSON.parse(localStorage.getItem(STORAGE_GAMESTATE));
    if (gs && !gs.gameOver &&
        gs.gridSize === state.gridSize && gs.winLength === state.winLength) {
      state.board              = gs.board;
      state.currentPlayerIndex = gs.currentPlayerIndex;
      state.moveCount          = gs.moveCount;
      state.gameOver           = false;
      state.winner             = null;
      state.winningCells       = [];
      state.undoStack          = gs.undoStack || [];
      return 'game';
    }
    return series ? 'game' : 'setup';
  } catch(e) { return 'setup'; }
}

function saveSeriesState() {
  localStorage.setItem(STORAGE_SERIES, JSON.stringify({
    gridSize: state.gridSize, winLength: state.winLength,
    player1Name: state.players[0].name, player2Name: state.players[1].name,
    scores: state.scores, history: state.history,
  }));
}

function saveGameState() {
  localStorage.setItem(STORAGE_GAMESTATE, JSON.stringify({
    gridSize: state.gridSize, winLength: state.winLength,
    board: state.board, currentPlayerIndex: state.currentPlayerIndex,
    moveCount: state.moveCount, gameOver: state.gameOver,
    winner: state.winner, undoStack: state.undoStack,
  }));
}

function clearAll() {
  localStorage.removeItem(STORAGE_SERIES);
  localStorage.removeItem(STORAGE_GAMESTATE);
}

// ═══════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════
function initNewGame() {
  state.board        = Array(state.gridSize * state.gridSize).fill(null);
  state.moveCount    = 0;
  state.gameOver     = false;
  state.winner       = null;
  state.winningCells = [];
  state.undoStack    = [];
  saveGameState();
}

function handleCellClick(index) {
  if (state.gameOver || state.board[index] !== null) return;

  state.undoStack.push({
    board: state.board.slice(),
    currentPlayerIndex: state.currentPlayerIndex,
    moveCount: state.moveCount,
  });

  const mark = state.players[state.currentPlayerIndex].mark;
  state.board[index] = mark;
  state.moveCount++;

  const winResult = checkWin(index);
  if (winResult.won) {
    endGame(state.players[state.currentPlayerIndex].id, winResult.cells);
  } else if (state.moveCount === state.gridSize * state.gridSize) {
    endGame('draw', []);
  } else {
    state.currentPlayerIndex = 1 - state.currentPlayerIndex;
    saveGameState();
    renderBoardCells();
    renderScoreboard();
    renderTurnIndicator();
    updateUndoButton();
  }
}

function handleUndo() {
  if (state.gameOver || state.undoStack.length === 0) return;
  const prev = state.undoStack.pop();
  state.board              = prev.board;
  state.currentPlayerIndex = prev.currentPlayerIndex;
  state.moveCount          = prev.moveCount;
  saveGameState();
  renderBoardCells();
  renderScoreboard();
  renderTurnIndicator();
  updateUndoButton();
}

function checkWin(index) {
  const N = state.gridSize, W = state.winLength;
  const mark = state.board[index];
  const row = Math.floor(index / N), col = index % N;
  for (const [dr, dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
    const cells = [index];
    for (let s = 1; s < W; s++) {
      const r = row+dr*s, c = col+dc*s;
      if (r<0||r>=N||c<0||c>=N||state.board[r*N+c]!==mark) break;
      cells.push(r*N+c);
    }
    for (let s = 1; s < W; s++) {
      const r = row-dr*s, c = col-dc*s;
      if (r<0||r>=N||c<0||c>=N||state.board[r*N+c]!==mark) break;
      cells.push(r*N+c);
    }
    if (cells.length >= W) return { won: true, cells };
  }
  return { won: false, cells: [] };
}

function endGame(winnerId, winningCells) {
  state.gameOver = true; state.winner = winnerId; state.winningCells = winningCells;
  if (winnerId === 'draw') state.scores.draws++;
  else state.scores[winnerId]++;
  state.history.unshift({ winner: winnerId, gridSize: state.gridSize,
    winLength: state.winLength, timestamp: Date.now() });
  saveGameState(); saveSeriesState();
  renderBoardCells();
  highlightWinningCells(winningCells);
  renderScoreboard();
  renderTurnIndicator();
  showResultBanner(winnerId);
  updateUndoButton();
  document.getElementById('board').classList.add('inactive');
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const isGame = id === 'screen-game';
  document.getElementById('action-bar').style.display = isGame ? 'flex' : 'none';
  document.getElementById('setup-bar').style.display  = isGame ? 'none' : 'block';
}

function renderSetupScreen(prefill) {
  document.getElementById('p1-name').value = prefill ? state.players[0].name : '';
  document.getElementById('p2-name').value = prefill ? state.players[1].name : '';

  const row = document.getElementById('templates-row');
  row.innerHTML = '';
  TEMPLATES.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-template';
    btn.textContent = t.label;
    btn.addEventListener('click', () => onTemplateClick(i));
    row.appendChild(btn);
  });

  if (prefill) {
    document.getElementById('grid-size').value  = state.gridSize;
    document.getElementById('win-length').value = state.winLength;
    highlightMatchingTemplate();
  }
  document.getElementById('setup-error').textContent = '';
  showScreen('screen-setup');
}

function highlightMatchingTemplate() {
  const gs = parseInt(document.getElementById('grid-size').value);
  const wl = parseInt(document.getElementById('win-length').value);
  document.querySelectorAll('.btn-template').forEach((btn, i) =>
    btn.classList.toggle('active', TEMPLATES[i].gridSize===gs && TEMPLATES[i].winLength===wl));
}

function renderGameScreen() {
  document.getElementById('score-p1-name').textContent = state.players[0].name;
  document.getElementById('score-p2-name').textContent = state.players[1].name;
  document.getElementById('config-badge').textContent =
    `${state.gridSize}×${state.gridSize} · ${state.winLength} in a row`;
  document.getElementById('drawer-config-sub').textContent =
    `${state.gridSize}×${state.gridSize}, win ${state.winLength}`;
  document.getElementById('board').classList.remove('inactive');
  document.getElementById('result-banner').classList.remove('show');
  document.getElementById('turn-indicator').style.display = '';
  renderScoreboard();
  renderTurnIndicator();
  buildBoardDOM();
  renderBoardCells();
  highlightWinningCells(state.winningCells);
  updateUndoButton();
  // reset history sheet
  document.getElementById('history-sheet').classList.remove('open');
  showScreen('screen-game');
}

function renderScoreboard() {
  document.getElementById('score-p1-wins').textContent = state.scores.p1;
  document.getElementById('score-p2-wins').textContent = state.scores.p2;
  document.getElementById('score-draws').textContent   = state.scores.draws;
  document.getElementById('score-p1').classList.toggle('active-player',
    !state.gameOver && state.currentPlayerIndex === 0);
  document.getElementById('score-p2').classList.toggle('active-player',
    !state.gameOver && state.currentPlayerIndex === 1);
}

function renderTurnIndicator() {
  const el = document.getElementById('turn-indicator');
  if (state.gameOver) { el.textContent = ''; return; }
  const p = state.players[state.currentPlayerIndex];
  el.innerHTML = `<span class="${p.mark.toLowerCase()}">${escHtml(p.name)}</span>'s turn`;
}

function buildBoardDOM() {
  const board = document.getElementById('board');
  const N = state.gridSize;
  // available space: viewport minus scoreboard, turn indicator, config badge, action bar, result banner
  const usableH = window.innerHeight - 200;
  const usableW = Math.min(window.innerWidth, 520) - 16;
  const maxPx   = Math.min(usableW, usableH);
  const cellPx  = Math.max(28, Math.floor((maxPx - N * 3 - 6) / N));

  board.style.gridTemplateColumns = `repeat(${N}, ${cellPx}px)`;
  document.documentElement.style.setProperty('--cell-size', `${cellPx}px`);
  board.innerHTML = '';

  for (let i = 0; i < N * N; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.width = cell.style.height = `${cellPx}px`;
    cell.dataset.index = i;
    cell.addEventListener('click', () => handleCellClick(i));
    board.appendChild(cell);
  }
}

function renderBoardCells() {
  document.querySelectorAll('.cell').forEach((cell, i) => {
    const mark = state.board[i];
    cell.textContent = mark || '';
    cell.className = 'cell' + (mark ? ` taken mark-${mark.toLowerCase()}` : '');
  });
}

function highlightWinningCells(cells) {
  if (!cells || !cells.length) return;
  const all = document.querySelectorAll('.cell');
  cells.forEach(i => { if (all[i]) all[i].classList.add('winning'); });
}

function updateUndoButton() {
  document.getElementById('btn-undo').disabled =
    state.gameOver || state.undoStack.length === 0;
}

function showResultBanner(winnerId) {
  const title = document.getElementById('result-title');
  if (winnerId === 'draw') {
    title.textContent = "It's a Draw!"; title.className = 'result-title draw';
  } else {
    const p = state.players.find(p => p.id === winnerId);
    title.textContent = `${p.name} Wins!`;
    title.className   = `result-title ${p.mark.toLowerCase()}`;
  }
  document.getElementById('turn-indicator').style.display = 'none';
  document.getElementById('result-banner').classList.add('show');
}

function hideResultBanner() {
  document.getElementById('result-banner').classList.remove('show');
  document.getElementById('turn-indicator').style.display = '';
}

function renderHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  if (!state.history.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:0.82rem;padding:0.3rem 0">No games yet.</div>';
    return;
  }
  state.history.slice(0, 50).forEach((entry, idx) => {
    const div = document.createElement('div');
    div.className = 'history-entry';
    let winnerText, cls;
    if (entry.winner === 'draw') { winnerText = 'Draw'; cls = 'draw'; }
    else {
      const p = state.players.find(p => p.id === entry.winner);
      winnerText = p ? p.name : entry.winner;
      cls = p ? p.mark.toLowerCase() : '';
    }
    const date = new Date(entry.timestamp).toLocaleString(undefined,
      { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    div.innerHTML =
      `<span class="winner ${cls}">${escHtml(winnerText)}</span>` +
      `<span>${entry.gridSize}×${entry.gridSize}/${entry.winLength}</span>` +
      `<span>${date}</span>`;
    list.appendChild(div);
  });
}

// ═══════════════════════════════════════════════
//  DRAWER
// ═══════════════════════════════════════════════
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-backdrop').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
}

// ═══════════════════════════════════════════════
//  EVENT HANDLERS
// ═══════════════════════════════════════════════
function onTemplateClick(idx) {
  const t = TEMPLATES[idx];
  document.getElementById('grid-size').value  = t.gridSize;
  document.getElementById('win-length').value = t.winLength;
  highlightMatchingTemplate();
}

function onStartSeries() {
  const p1name = document.getElementById('p1-name').value.trim() || 'Player 1';
  const p2name = document.getElementById('p2-name').value.trim() || 'Player 2';
  const gs  = parseInt(document.getElementById('grid-size').value)  || 3;
  const wl  = parseInt(document.getElementById('win-length').value) || 3;
  const err = document.getElementById('setup-error');

  if (gs < MIN_GRID || gs > MAX_GRID) {
    err.textContent = `Grid must be ${MIN_GRID}–${MAX_GRID}.`; return;
  }
  if (wl < 3 || wl > gs) {
    err.textContent = `Win length must be 3–${gs}.`; return;
  }
  err.textContent = '';

  const changed = gs !== state.gridSize || wl !== state.winLength;
  state.players[0].name = p1name;
  state.players[1].name = p2name;
  state.gridSize = gs; state.winLength = wl;
  if (changed) { state.scores = { p1:0, p2:0, draws:0 }; state.history = []; clearAll(); }
  state.currentPlayerIndex = 0;
  initNewGame(); saveSeriesState(); renderGameScreen();
}

function onNewGame() {
  hideResultBanner();
  state.currentPlayerIndex = 1 - state.currentPlayerIndex;
  initNewGame(); renderGameScreen();
}

function onNewSeries() {
  hideResultBanner();
  closeDrawer();
  clearAll();
  state.scores = { p1:0, p2:0, draws:0 }; state.history = [];
  renderSetupScreen(true);
}

// ═══════════════════════════════════════════════
//  UTILITY
// ═══════════════════════════════════════════════
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // Setup screen
  document.getElementById('btn-start').addEventListener('click', onStartSeries);
  document.getElementById('grid-size').addEventListener('input', highlightMatchingTemplate);
  document.getElementById('win-length').addEventListener('input', highlightMatchingTemplate);

  // Action bar
  document.getElementById('btn-new-game').addEventListener('click', onNewGame);
  document.getElementById('btn-undo').addEventListener('click', handleUndo);
  document.getElementById('btn-menu').addEventListener('click', openDrawer);

  // Drawer
  document.getElementById('drawer-backdrop').addEventListener('click', closeDrawer);

  document.getElementById('btn-drawer-settings').addEventListener('click', () => {
    closeDrawer(); renderSetupScreen(true);
  });

  document.getElementById('btn-drawer-new-series').addEventListener('click', onNewSeries);

  document.getElementById('btn-drawer-history').addEventListener('click', () => {
    const sheet = document.getElementById('history-sheet');
    const open  = sheet.classList.toggle('open');
    if (open) renderHistory();
  });

  // Swipe down to close drawer
  let touchStartY = 0;
  document.getElementById('drawer').addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  document.getElementById('drawer').addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - touchStartY > 60) closeDrawer();
  }, { passive: true });

  // Boot
  const route = loadFromStorage();
  if (route === 'game') {
    renderGameScreen();
    if (state.gameOver && state.winner) {
      showResultBanner(state.winner);
      document.getElementById('board').classList.add('inactive');
    }
  } else {
    renderSetupScreen(false);
  }

  // Resize
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (document.getElementById('screen-game').classList.contains('active')) {
        buildBoardDOM(); renderBoardCells(); highlightWinningCells(state.winningCells);
      }
    }, 150);
  });
});
</script>
